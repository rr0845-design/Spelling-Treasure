<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spelling Blast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="h-screen w-screen flex flex-col items-center select-none overflow-hidden bg-[#F9F7F2] text-[#12121A] font-[Prompt]">

    <!-- Header: คะแนน -->
    <header class="w-full max-w-2xl px-6 pt-6 pb-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <span class="text-3xl">⭐</span>
            <p id="score-display" class="text-3xl font-black text-[#465AE1]">0 / 20</p>
        </div>
        <div class="px-4 py-2 bg-white rounded-xl shadow-sm font-bold text-gray-500">
            Rank: <span id="rank-display" class="text-[#F75B32]">A2</span>
        </div>
    </header>

    <main class="flex-1 w-full max-w-2xl flex flex-col items-center justify-start px-4 mt-4 gap-8">
        
        <!-- กล่องคำใบ้ (Meaning) -->
        <div class="text-center w-full px-6 py-8 bg-white rounded-2xl shadow-[0_4px_15px_rgba(0,0,0,0.05)] border-2 border-white min-h-[120px] flex items-center justify-center">
            <h2 id="meaning-display" class="text-xl md:text-2xl font-bold text-gray-700">
                ⏳ กำลังโหลดคำศัพท์จากระบบ...
            </h2>
        </div>

        <!-- ช่องวางบล็อกคำศัพท์ (Spelling Slots) -->
        <div id="spelling-slots" class="flex flex-wrap justify-center gap-2 md:gap-3">
            <!-- สร้างผ่าน JS -->
        </div>

        <!-- แป้นบล็อกตัวอักษร 3D (Letter Pool) -->
        <div id="letter-pool" class="grid grid-cols-5 md:grid-cols-7 gap-3 w-full mt-4">
            <!-- สร้างผ่าน JS -->
        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
