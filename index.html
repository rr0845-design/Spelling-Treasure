<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Spelling Treasure - Data Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-[#0A1F16] text-white p-6 md:p-10">
    <h1 class="text-3xl font-black text-[#FFD700] mb-6">Spelling Treasure - Data Viewer</h1>
    
    <div class="bg-white/10 p-6 rounded-xl border border-white/20">
        <label class="block mb-2 font-bold text-[#FFD700]">เลือก Collection ที่ต้องการดู:</label>
        <select id="viewCollection" class="text-black p-3 rounded w-full mb-6 font-medium" onchange="viewData()">
            <option value="">-- เลือก Collection --</option>
            <option value="Vocab_Master">Vocab_Master</option>
            <option value="User_Profile">User_Profile</option>
            <option value="User_Streak">User_Streak</option>
            <option value="User_Progress">User_Progress</option>
            <option value="Activity_Logs">Activity_Logs</option>
            <option value="Assessment_Records">Assessment_Records</option>
        </select>

        <div class="overflow-x-auto bg-white/5 rounded-lg">
            <table id="dataTable" class="w-full text-left text-sm">
                <thead id="tableHead" class="bg-white/10 border-b border-white/20 uppercase text-xs tracking-wider"></thead>
                <tbody id="tableBody" class="divide-y divide-white/10">
                    <tr><td class="p-6 text-center italic">เลือก Collection ด้านบนเพื่อเริ่มดูข้อมูลครับ...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBaaLvQCgokMUeqVm0VMxwHGE3xtFJk0Zs",
            authDomain: "spellingtreasure.firebaseapp.com",
            databaseURL: "https://spellingtreasure-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "spellingtreasure",
            storageBucket: "spellingtreasure.firebasestorage.app",
            messagingSenderId: "763332831883",
            appId: "1:763332831883:web:a032042096e8a9d2c4028e"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function viewData() {
            const collection = document.getElementById('viewCollection').value;
            if (!collection) return;

            const tableHead = document.getElementById('tableHead');
            const tableBody = document.getElementById('tableBody');
            
            tableBody.innerHTML = "<tr><td class='p-6 text-center'>กำลังโหลดข้อมูล...</td></tr>";

            const snapshot = await db.collection(collection).get();
            if (snapshot.empty) {
                tableBody.innerHTML = "<tr><td class='p-6 text-center'>ไม่พบข้อมูลในนี้ครับ</td></tr>";
                tableHead.innerHTML = "";
                return;
            }

            const firstDoc = snapshot.docs[0].data();
            const headers = Object.keys(firstDoc);
            
            tableHead.innerHTML = `<tr>${headers.map(h => `<th class="p-4">${h}</th>`).join('')}</tr>`;
            
            tableBody.innerHTML = snapshot.docs.map(doc => {
                const data = doc.data();
                return `<tr>${headers.map(h => `<td class="p-4 border-b border-white/5">${data[h] || '-'}</td>`).join('')}</tr>`;
            }).join('');
        }
    </script>
</body>
</html>
