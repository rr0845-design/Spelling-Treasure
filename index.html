<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" name="viewport"/>
    <title>Spelling Treasure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <!-- Firebase CDN -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 🌟 ใส่ Config ของคุณครูตรงนี้ครับ
        const firebaseConfig = {
            apiKey: "AIzaSyBaaLvQCgokMUeqVm0VMxwHGE3xtFJk0Zs",
            authDomain: "spellingtreasure.firebaseapp.com",
            projectId: "spellingtreasure",
            storageBucket: "spellingtreasure.appspot.com",
            messagingSenderId: "763332831883",
            appId: "1:763332831883:web:a032042096e8a9d2c4028e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;
    </script>
</head>
<body class="bg-[#0A1F16] text-white">
    <!-- UI ธีมป่าสมบัติที่จัดไว้ให้แล้ว -->
    <div id="app" class="p-6">
        <h1 class="text-3xl font-black text-[#FFD700]">Spelling Treasure</h1>
        <p>เชื่อมต่อ Firebase เรียบร้อยแล้ว พร้อมเริ่มลุย!</p>
    </div>
    <div id="admin-panel" class="p-6 bg-white/10 rounded-xl mt-10">
    <h2 class="text-xl font-bold text-[#FFD700]">Admin: Import Vocab (540 คำ)</h2>
    <textarea id="vocabInput" class="w-full h-32 mt-4 text-black p-2" placeholder="Copy ข้อมูลจาก Google Sheets มาวางตรงนี้..."></textarea>
    <button onclick="importVocab()" class="mt-4 px-6 py-2 bg-green-600 text-white rounded">Import เข้า Firestore</button>
</div>
<script type="module">
    import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    
<!-- ให้วางทับส่วน <script type="module"> เดิมของคุณครูด้วยอันนี้ครับ -->
<script>
    // ใช้ฟังก์ชันแบบปกติที่รันได้ทันที
    window.importVocab = async () => {
        const rawData = document.getElementById('vocabInput').value;
        if (!rawData) {
            alert("ยังไม่ได้วางข้อมูลครับ!");
            return;
        }

        const rows = rawData.split('\n');
        let count = 0;

        for (let i = 0; i < rows.length; i++) {
            // ข้ามบรรทัดที่เป็นหัวตาราง
            if (rows[i].includes('ID') || rows[i].trim() === '') continue;
            
            const cols = rows[i].split('\t');
            if (cols.length >= 4) {
                const vocabData = {
                    id: cols[0],
                    word: cols[1],
                    category: cols[2],
                    meaning: cols[3]
                };
                
                // ใช้คำสั่งบันทึกที่เรียกผ่าน firebase SDK ที่เราโหลดไว้แล้ว
                try {
                    await firebase.firestore().collection("vocab_master").doc(vocabData.id).set(vocabData);
                    count++;
                } catch (e) {
                    console.error("Error ที่แถว " + i, e);
                }
            }
        }
        alert("Import เสร็จแล้ว! นำเข้าข้อมูลได้ทั้งหมด " + count + " คำครับ");
    };
</script>
</body>
</html>
