<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
    <title>Spelling Blast - GAS Mode</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script> 
    <!-- Google Material Symbols for icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,700,1,0" />
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex flex-col h-[100dvh] w-full max-w-md mx-auto relative">

    <!-- 🌟 Top Bar -->
    <header class="w-full flex justify-between items-center px-6 pt-10 pb-4 flex-shrink-0 z-10">
        <div class="flex flex-col">
            <h1 class="text-[10px] font-black text-gray-400 tracking-widest uppercase mb-0.5">Level Score</h1>
            <div class="flex items-baseline gap-1">
                <p id="score-display" class="text-3xl font-black text-white drop-shadow-md">00<span class="text-lg text-gray-500">/20</span></p>
            </div>
        </div>
        
        <div class="flex flex-col items-end">
            <h1 class="text-[10px] font-black text-gray-400 tracking-widest uppercase mb-1.5">Energy</h1>
            <div id="hearts-container" class="flex gap-1.5 justify-end"></div>
        </div>
    </header>

    <!-- ⏱️ Timer Bar -->
    <div class="w-full px-6 flex-shrink-0 mb-6 z-10">
        <div class="flex justify-between items-center text-[10px] font-black text-gray-400 tracking-widest mb-1.5">
            <span>TIME LEFT</span>
            <span id="timer-text" class="text-white">60s</span>
        </div>
        <div class="w-full h-2.5 bg-black/40 rounded-full overflow-hidden border border-white/10 shadow-inner">
            <div id="timer-bar" class="h-full bg-gradient-to-r from-[#FFD166] to-[#FF9F1C] w-full origin-left rounded-full shadow-[0_0_12px_#FFD166]"></div>
        </div>
    </div>

    <!-- 🧩 Game Area -->
    <main class="w-full px-6 flex flex-col items-center flex-grow justify-start z-10">
        
        <!-- โจทย์ (ความหมาย) แบบ Glassmorphism -->
        <div class="glass-card w-full rounded-[24px] p-8 pt-10 text-center relative mb-8 flex flex-col items-center justify-center min-h-[150px]">
            <!-- Badge -->
            <div class="absolute -top-4 left-1/2 -translate-x-1/2 bg-gradient-to-r from-[#FF3366] to-[#FF0044] text-white text-[11px] font-black px-5 py-1.5 rounded-full tracking-widest shadow-[0_4px_12px_rgba(255,51,102,0.6)] border-2 border-[#1E1E32]">
                TRANSLATE
            </div>
            
            <h2 id="meaning-display" class="text-3xl md:text-4xl font-black text-white tracking-wide leading-tight drop-shadow-lg">กำลังโหลดคำศัพท์...</h2>
        </div>

        <!-- ⏭️ ปุ่ม Skip -->
        <div class="w-full flex justify-end mb-2">
            <button onclick="skipWord()" class="skip-btn flex items-center gap-1 text-[10px] font-bold text-gray-400 hover:text-white bg-white/5 hover:bg-white/15 px-3 py-1.5 rounded-full border border-white/10 transition-all active:scale-95">
                <span>SKIP</span>
                <span class="material-symbols-rounded text-[16px]">skip_next</span>
            </button>
        </div>

        <!-- ช่องว่างเติมตัวอักษร (Slots) -->
        <div id="spelling-slots" class="flex flex-wrap justify-center gap-2 md:gap-3 w-full min-h-[72px]"></div>

        <!-- ข้อความแจ้งเตือน -->
        <div id="feedback-msg" class="h-8 mt-6 text-2xl font-black tracking-widest text-center opacity-0 uppercase">GREAT!</div>
        
    </main>

    <!-- 🧱 Letter Pool (Keyboard Tray แบบ Grid 4 คอลัมน์) -->
    <footer class="w-full px-5 pt-8 pb-10 flex-shrink-0 glass-card rounded-t-[32px] border-b-0 border-x-0 flex flex-col items-center z-10 bg-white/5">
        <div id="letter-pool" class="grid grid-cols-4 gap-3 max-w-[340px] w-full mx-auto justify-items-center"></div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
