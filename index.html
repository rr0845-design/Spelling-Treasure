<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" name="viewport"/>
    <title>Spelling Treasure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <!-- Firebase CDN -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 🌟 ใส่ Config ของคุณครูตรงนี้ครับ
        const firebaseConfig = {
            apiKey: "AIzaSyBaaLvQCgokMUeqVm0VMxwHGE3xtFJk0Zs",
            authDomain: "spellingtreasure.firebaseapp.com",
            projectId: "spellingtreasure",
            storageBucket: "spellingtreasure.appspot.com",
            messagingSenderId: "763332831883",
            appId: "1:763332831883:web:a032042096e8a9d2c4028e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;
    </script>
</head>
<body class="bg-[#0A1F16] text-white">
    <!-- UI ธีมป่าสมบัติที่จัดไว้ให้แล้ว -->
    <div id="app" class="p-6">
        <h1 class="text-3xl font-black text-[#FFD700]">Spelling Treasure</h1>
        <p>เชื่อมต่อ Firebase เรียบร้อยแล้ว พร้อมเริ่มลุย!</p>
    </div>
    <div id="admin-panel" class="p-6 bg-white/10 rounded-xl mt-10">
    <h2 class="text-xl font-bold text-[#FFD700]">Admin: Import Vocab (540 คำ)</h2>
    <textarea id="vocabInput" class="w-full h-32 mt-4 text-black p-2" placeholder="Copy ข้อมูลจาก Google Sheets มาวางตรงนี้..."></textarea>
    <button onclick="importVocab()" class="mt-4 px-6 py-2 bg-green-600 text-white rounded">Import เข้า Firestore</button>
</div>
<script type="module">
    import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    
<script>
    async function runImport() {
        const collection = document.getElementById('targetCollection').value;
        const input = document.getElementById('vocabInput').value;
        if(!input) return alert("วางข้อมูลก่อนนะครับ!");
        
        const rows = input.split('\n');
        const headers = rows[0].split('\t');
        let successCount = 0;

        for(let i = 1; i < rows.length; i++) {
            if (rows[i].trim() === "") continue; // ข้ามแถวว่าง
            const cols = rows[i].split('\t');
            
            let dataObject = {};
            headers.forEach((header, index) => {
                dataObject[header.trim().toLowerCase()] = cols[index] ? cols[index].trim() : "";
            });

            try {
                // เช็คถ้าเป็น Activity_Logs ให้ใช้ .add() เพื่อสร้าง ID ใหม่เสมอ (ไม่ทับกัน)
                if (collection === "Activity_Logs") {
                    await firebase.firestore().collection(collection).add(dataObject);
                } else {
                    // ถ้าเป็น Vocab หรือ Profile ให้ใช้ ID แถวแรกเป็น Key
                    await firebase.firestore().collection(collection).doc(cols[0].trim()).set(dataObject);
                }
                successCount++;
            } catch(err) { console.error("Error แถวที่ " + i, err); }
        }
        alert("สำเร็จ! นำเข้าข้อมูลเข้า " + collection + " ทั้งหมด " + successCount + " รายการ");
    }
</script>
</body>
</html>
