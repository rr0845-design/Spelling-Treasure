<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
    <title>Spelling Master</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script> 
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,700,1,0" />
    <link rel="stylesheet" href="style.css">
</head>
<body class="w-full min-h-screen flex flex-col m-0 p-0 overflow-x-hidden select-none bg-[#0c0c14]">

    <!-- 📱 แจ้งเตือนให้หมุนจอ (สำหรับมือถือ/แท็บเล็ตในแนวนอน) -->
    <div id="rotate-overlay" class="fixed inset-0 bg-[#0c0c14] z-[999] flex-col justify-center items-center text-center px-6 hidden">
        <span class="material-symbols-rounded text-6xl text-[#FF3366] mb-4 animate-bounce">screen_rotation</span>
        <h2 class="text-2xl md:text-3xl font-black text-white mb-2 tracking-wide">โปรดหมุนอุปกรณ์</h2>
        <p class="text-gray-400 text-sm md:text-base">เกมนี้รองรับการเล่นในแนวตั้ง (Portrait) <br> สำหรับหน้าจอมือถือและแท็บเล็ต</p>
    </div>

    <!-- 🎮 MAIN CONTAINER -->
    <div id="game-container" class="relative min-h-screen w-full flex flex-col items-center justify-between overflow-x-hidden selection:bg-pink-500 selection:text-white pb-8">
        
        <!-- 🔐 หน้าจอ Login / Sign Up -->
        <div id="login-overlay" class="fixed inset-0 bg-[#31B5FF] z-[50] flex flex-col justify-center items-center px-4 overflow-hidden">
            <!-- Background Effect -->
            <div class="absolute inset-0 opacity-30 bg-[radial-gradient(circle_at_center,_#ffffff_0%,_transparent_70%)] mix-blend-overlay"></div>
            
            <!-- Game Logo -->
            <div class="mb-10 text-center z-10">
                <h1 class="text-5xl md:text-6xl font-black text-white uppercase tracking-wider" style="font-family: 'Nunito', sans-serif; -webkit-text-stroke: 3px #0F172A;">
                    <span class="text-white text-4xl md:text-5xl">SPELLING</span>
                    <br/>
                    <span class="text-[#FFD166]">M</span><span class="text-[#00E5FF]">A</span><span class="text-[#FF4B91]">S</span><span class="text-[#C084FC]">T</span><span class="text-[#4D96FF]">E</span><span class="text-[#FF9F1C]">R</span>
                </h1>
                <p class="text-white font-black text-sm md:text-base tracking-widest uppercase mt-4" style="-webkit-text-stroke: 1px #0F172A;">Vocabulary Game</p>
            </div>

            <!-- Popup Box -->
            <div class="relative w-full max-w-sm bg-[#5244D4] border-[6px] border-[#7265E6] rounded-[36px] p-6 text-center flex flex-col items-center shadow-[0_15px_35px_rgba(0,0,0,0.4)] z-10">
                
                <!-- Title Badge -->
                <div class="absolute -top-7 left-1/2 -translate-x-1/2 bg-[#5244D4] px-8 py-2 rounded-full border-[5px] border-[#7265E6] shadow-lg">
                    <h2 id="auth-title" class="text-2xl font-black text-white drop-shadow-[0_2px_0_#1E1B4B]" style="font-family: 'Nunito', sans-serif; text-shadow: -1px -1px 0 #1E1B4B, 0 -1px 0 #1E1B4B, 1px -1px 0 #1E1B4B, 1px 0 0 #1E1B4B, 1px 1px 0 #1E1B4B, 0 1px 0 #1E1B4B, -1px 1px 0 #1E1B4B, -1px 0 0 #1E1B4B;">LOGIN</h2>
                </div>

                <!-- Toggle Tabs -->
                <div class="flex w-full bg-[#372A99] rounded-full p-1.5 mb-5 mt-5 shadow-inner">
                    <button id="tab-login" onclick="switchTab('login')" class="flex-1 py-2 rounded-full text-white font-black bg-[#23C552] shadow-[0_4px_0_#168F3A] transition-all transform active:translate-y-[2px] active:shadow-[0_2px_0_#168F3A]">Login</button>
                    <button id="tab-register" onclick="switchTab('register')" class="flex-1 py-2 rounded-full text-[#A59DF6] font-bold hover:text-white transition-all">Sign Up</button>
                </div>

                <p id="auth-subtitle" class="text-[#C6BFFF] text-sm mb-4 font-bold">เข้าสู่ระบบด้วยอีเมลเดิมของคุณ</p>
                
                <!-- Register Only: Name Input -->
                <div id="name-input-container" class="w-full hidden">
                    <input type="text" id="name-input" placeholder="Player Name" class="w-full bg-[#372A99] border-[3px] border-[#2A1E7A] rounded-[20px] px-5 py-4 text-white text-lg focus:outline-none focus:border-[#20E3B2] transition-colors mb-3 text-center placeholder:text-[#8376E6] font-black shadow-inner" />
                </div>
                
                <input type="email" id="email-input" placeholder="student@school.edu" class="w-full bg-[#372A99] border-[3px] border-[#2A1E7A] rounded-[20px] px-5 py-4 text-white text-lg focus:outline-none focus:border-[#20E3B2] transition-colors mb-4 text-center placeholder:text-[#8376E6] font-black shadow-inner tracking-wider" />
                
                <p id="auth-error" class="text-[#FF4D79] text-sm font-black h-6 mb-2 drop-shadow-md"></p>
                
                <!-- Submit Button -->
                <button id="auth-btn" onclick="submitAuth()" class="w-full bg-gradient-to-b from-[#4ADE80] to-[#22C55E] text-white font-black text-2xl py-4 rounded-[20px] shadow-[0_8px_0_#16A34A] hover:brightness-110 active:translate-y-[8px] active:shadow-none transition-all flex items-center justify-center gap-2 border-[3px] border-[#86EFAC]">
                    <span id="auth-btn-text" class="drop-shadow-[0_2px_0_#15803D] uppercase tracking-wide">PLAY</span>
                </button>
            </div>
        </div>

        <!-- 🌟 Floating Pill Top Bar -->
        <div class="w-full max-w-4xl px-4 md:px-6 pt-4 md:pt-6 z-20">
            <header class="w-full bg-white rounded-full shadow-[0_8px_20px_rgba(15,23,42,0.08)] px-6 py-3 md:py-4 flex justify-between items-center border-[3px] border-white">
                <!-- Left: Player Name -->
                <div class="flex flex-col items-start w-1/3">
                    <h1 class="text-[9px] md:text-[10px] font-black text-gray-400 tracking-widest uppercase mb-0.5">Player</h1>
                    <div class="flex items-center gap-1 md:gap-2">
                        <span class="material-symbols-rounded text-[#FFD166] text-[20px] md:text-[28px]">person</span>
                        <p id="player-name-display" class="text-base md:text-xl font-black text-[#0F172A] truncate max-w-[80px] md:max-w-[150px]">...</p>
                    </div>
                </div>

                <!-- Center: Score -->
                <div class="flex flex-col items-center w-1/3">
                    <h1 class="text-[9px] md:text-[10px] font-black text-gray-400 tracking-widest uppercase mb-0.5">Score</h1>
                    <p id="score-display" class="text-2xl md:text-3xl font-black text-[#0F172A]">00<span class="text-sm md:text-base text-gray-400">/20</span></p>
                </div>
                
                <!-- Right: Energy -->
                <div class="flex flex-col items-end w-1/3">
                    <h1 class="text-[9px] md:text-[10px] font-black text-gray-400 tracking-widest uppercase mb-1">Energy</h1>
                    <div id="hearts-container" class="flex gap-1 md:gap-1.5 justify-end flex-nowrap"></div>
                </div>
            </header>
        </div>

    <!-- ⏱️ Timer Bar -->
    <div class="w-full max-w-5xl px-6 flex-shrink-0 mt-4 mb-3 md:mb-6 z-10">
        <div class="flex justify-between items-center text-[10px] md:text-xs font-black text-sky-800 tracking-widest mb-1.5">
            <span>TIME LEFT</span>
            <span id="timer-text" class="text-[#0F172A] font-black">60s</span>
        </div>
        <div class="w-full h-3 md:h-4 bg-white/50 rounded-full overflow-hidden shadow-inner">
            <div id="timer-bar" class="h-full bg-[#FFD166] w-full origin-left rounded-full"></div>
        </div>
    </div>

    <!-- 🧩 Game Area -->
    <main class="w-full max-w-5xl px-4 md:px-6 flex flex-col items-center flex-grow justify-start z-10">
        
        <!-- 🔲 Premium Game Zone Frame (3D Clay Style) -->
        <div class="ui-frame w-full p-4 md:p-6 flex flex-col items-center mb-4 relative mt-2 z-10">
            
            <!-- ช่องว่างเติมตัวอักษร (Slots) ในบรรทัดเดียว -->
            <div id="spelling-slots" class="flex flex-nowrap justify-center items-center gap-1.5 md:gap-2 w-full mt-2 mb-8 md:mb-12 px-1 md:px-4 z-20"></div>

            <!-- โจทย์ (ความหมาย) แบบ Soft Pill -->
            <div class="meaning-box w-full p-4 md:p-8 pt-8 text-center relative flex flex-col items-center justify-center min-h-[100px] md:min-h-[140px]">
                <!-- 3D Badge -->
                <div class="absolute -top-5 md:-top-6 left-1/2 -translate-x-1/2 bg-[#FF6B9E] text-white text-sm md:text-base font-black px-6 md:px-10 py-1.5 md:py-2 rounded-full tracking-widest shadow-[inset_0_-4px_0_rgba(0,0,0,0.1),_0_6px_10px_rgba(216,0,75,0.2)]">
                    TRANSLATE
                </div>
                
                <h2 id="meaning-display" class="text-3xl md:text-5xl font-black text-[#0F172A] tracking-wide leading-tight w-full break-words">กำลังโหลดคำศัพท์...</h2>
            </div>
        </div>

        <!-- ⏭️ ปุ่ม Skip & Feedback -->
        <div class="w-full flex justify-between items-center mb-4 md:mb-6">
            <div id="feedback-msg" class="text-3xl md:text-5xl font-black tracking-widest text-left opacity-0 uppercase text-stroke drop-shadow-lg">GREAT!</div>
            <button onclick="skipWord()" class="skip-btn flex items-center gap-1 text-[12px] md:text-base font-bold text-white hover:text-[#FFD166] bg-black/20 hover:bg-black/30 px-6 py-3 rounded-full border-2 border-white/20 transition-all active:scale-95 shadow-md">
                <span>SKIP</span>
                <span class="material-symbols-rounded text-[20px] md:text-[24px]">skip_next</span>
            </button>
        </div>
        
    </main>

    <!-- 🧱 Letter Pool -->
    <footer class="w-full max-w-2xl px-2 md:px-8 pt-2 pb-8 flex-shrink-0 flex flex-col items-center z-10 mx-auto">
        <div id="letter-pool" class="flex flex-wrap gap-2 md:gap-4 w-full justify-center"></div>
    </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
